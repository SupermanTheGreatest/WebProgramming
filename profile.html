<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrialBridge — My Profile</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .profile-header {
            padding: 140px 24px 60px;
            text-align: center;
            position: relative;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 10%, rgba(42, 157, 143, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .profile-header .eyebrow {
            display: inline-block;
            background: rgba(42, 157, 143, 0.1);
            color: var(--teal-dark);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(42, 157, 143, 0.2);
            margin-bottom: 20px;
        }

        .profile-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 18px;
            color: var(--text);
        }

        .profile-container {
            max-width: 800px;
            margin: 0 auto 100px;
            padding: 0 24px;
        }

        .profile-card {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.04);
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--teal);
            color: white;
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .data-group {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .data-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            display: block;
            margin-bottom: 4px;
        }

        .data-group .val {
            font-size: 1.1rem;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        .logout-btn {
            background: transparent;
            color: var(--coral);
            border: 1.5px solid var(--coral);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            margin: 24px auto 0;
        }

        .logout-btn:hover {
            background: var(--coral);
            color: white;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- NAV -->
    <nav class="nav-fixed">
        <a href="index.html" class="logo">Trial<span>Bridge</span></a>
        <ul class="nav-links">
            <li><a href="find-trials.html">Find Trials</a></li>
            <li><a href="how-it-works.html">How It Works</a></li>
            <li><a href="for-researchers.html">For Researchers</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="medstudies.html">Medical Studies</a></li>
        </ul>
        <button class="nav-cta" onclick="handleLogout()" id="navLoginBtn">Sign Out</button>
    </nav>

    <!-- HEADER -->
    <div class="profile-header">
        <div class="eyebrow">Patient Dashboard</div>
        <h1>Your <em>Profile</em></h1>
    </div>

    <div class="profile-container">
        <div class="profile-card" id="profileCard">
            <p style="color:var(--muted);">Loading your details...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="main.js" defer></script>
</body>

</html>
